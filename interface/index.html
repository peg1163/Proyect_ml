<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Prediccion de Precio de Casa</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="toolbar">
        <div>
          <h1>Prediccion de Precio</h1>
          <p>Modelo CatBoost desplegable en Vertex AI</p>
        </div>
        <label class="endpoint-field">
          Endpoint
          <input id="endpointUrl" type="url" value="http://localhost:8080/predict" />
        </label>
      </section>

      <section class="layout">
        <form id="predictionForm" class="panel">
          <div class="section-title">Datos principales</div>
          <div class="grid">
            <label>Habitaciones<input name="bedrooms" type="number" step="1" value="3" /></label>
            <label>Banos<input name="bathrooms" type="number" step="0.25" value="1" /></label>
            <label>Area vivienda sqft<input name="sqft_living" type="number" step="1" value="1180" /></label>
            <label>Area lote sqft<input name="sqft_lot" type="number" step="1" value="5650" /></label>
            <label>Pisos<input name="floors" type="number" step="0.5" value="1" /></label>
            <label>Vista al agua<input name="waterfront" type="number" min="0" max="1" step="1" value="0" /></label>
          </div>

          <div class="section-title">Calidad y ubicacion</div>
          <div class="grid">
            <label>Vista<input name="view" type="number" min="0" max="4" step="1" value="0" /></label>
            <label>Condicion<input name="condition" type="number" min="1" max="5" step="1" value="3" /></label>
            <label>Grado<input name="grade" type="number" min="1" max="13" step="1" value="7" /></label>
            <label>Zipcode<input name="zipcode" type="number" step="1" value="98178" /></label>
            <label>Latitud<input name="lat" type="number" step="0.0001" value="47.5112" /></label>
            <label>Longitud<input name="long" type="number" step="0.0001" value="-122.257" /></label>
          </div>

          <div class="section-title">Construccion</div>
          <div class="grid">
            <label>Sqft arriba<input name="sqft_above" type="number" step="1" value="1180" /></label>
            <label>Sqft sotano<input name="sqft_basement" type="number" step="1" value="0" /></label>
            <label>Ano construccion<input name="yr_built" type="number" step="1" value="1955" /></label>
            <label>Ano renovacion<input name="yr_renovated" type="number" step="1" value="0" /></label>
            <label>Sqft living 15<input name="sqft_living15" type="number" step="1" value="1340" /></label>
            <label>Sqft lot 15<input name="sqft_lot15" type="number" step="1" value="5650" /></label>
          </div>

          <div class="actions">
            <button type="submit">Predecir precio</button>
            <button type="button" id="loadExample">Cargar ejemplo</button>
          </div>
        </form>

        <aside class="result-panel">
          <div class="section-title">Resultado</div>
          <table>
            <tbody>
              <tr>
                <th>Prediccion</th>
                <td id="predictionCell">-</td>
              </tr>
              <tr>
                <th>Estado</th>
                <td id="statusCell">Esperando datos</td>
              </tr>
            </tbody>
          </table>
          <pre id="payloadPreview"></pre>
        </aside>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
